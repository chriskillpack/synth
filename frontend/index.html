<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synth</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <h1>Subtractive Synth</h1>

  <div id="synth">
    <!-- Performance area: piano + waveform -->
    <div id="piano"></div>
    <canvas id="scope" width="700" height="100"></canvas>

    <!-- Controls grid: 2 columns -->
    <div class="controls-grid">
      <details open>
        <summary>Oscillator</summary>
        <div class="control-row">
          <label for="waveform">Waveform</label>
          <select id="waveform">
            <option value="0">Sine</option>
            <option value="1" selected>Saw</option>
            <option value="2">Square</option>
            <option value="3">Triangle</option>
          </select>
        </div>
      </details>

      <details open>
        <summary>Filter</summary>
        <div class="control-row">
          <label>Cutoff</label>
          <input type="range" min="0" max="1" step="0.001" value="0.66"
                 data-param="filterCutoff" data-mapping="cutoff">
          <span class="value-display"></span>
        </div>
        <div class="control-row">
          <label>Resonance</label>
          <input type="range" min="0.1" max="30" step="0.1" value="1"
                 data-param="filterResonance" data-mapping="linear">
          <span class="value-display"></span>
        </div>
        <div class="control-row">
          <label>Env Amt</label>
          <input type="range" min="0" max="20000" step="10" value="4000"
                 data-param="filterEnvAmount" data-mapping="linear">
          <span class="value-display"></span>
        </div>
      </details>

      <details open>
        <summary>Amp Envelope</summary>
        <div class="control-row">
          <label>Attack</label>
          <input type="range" min="0" max="1" step="0.001" value="0.25"
                 data-param="ampAttack" data-mapping="time">
          <span class="value-display"></span>
        </div>
        <div class="control-row">
          <label>Decay</label>
          <input type="range" min="0" max="1" step="0.001" value="0.35"
                 data-param="ampDecay" data-mapping="time">
          <span class="value-display"></span>
        </div>
        <div class="control-row">
          <label>Sustain</label>
          <input type="range" min="0" max="1" step="0.001" value="0.8"
                 data-param="ampSustain" data-mapping="linear">
          <span class="value-display"></span>
        </div>
        <div class="control-row">
          <label>Release</label>
          <input type="range" min="0" max="1" step="0.001" value="0.4"
                 data-param="ampRelease" data-mapping="time">
          <span class="value-display"></span>
        </div>
      </details>

      <details open>
        <summary>LFO</summary>
        <div class="control-row">
          <label>Rate</label>
          <input type="range" min="0" max="1" step="0.001" value="0.37"
                 data-param="lfoRate" data-mapping="lfo-rate">
          <span class="value-display"></span>
        </div>
        <div class="control-row">
          <label>Depth</label>
          <input type="range" min="0" max="1" step="0.001" value="0"
                 data-param="lfoDepth" data-mapping="linear">
          <span class="value-display"></span>
        </div>
        <div class="control-row">
          <label>Wave</label>
          <select id="lfo-waveform">
            <option value="0" selected>Sine</option>
            <option value="1">Triangle</option>
            <option value="2">Square</option>
          </select>
        </div>
        <div class="control-row">
          <label>Dest</label>
          <select id="lfo-dest">
            <option value="0" selected>Pitch</option>
            <option value="1">Filter</option>
            <option value="2">Amplitude</option>
          </select>
        </div>
      </details>

      <details open>
        <summary>Filter Envelope</summary>
        <div class="control-row">
          <label>Attack</label>
          <input type="range" min="0" max="1" step="0.001" value="0.25"
                 data-param="filterAttack" data-mapping="time">
          <span class="value-display"></span>
        </div>
        <div class="control-row">
          <label>Decay</label>
          <input type="range" min="0" max="1" step="0.001" value="0.4"
                 data-param="filterDecay" data-mapping="time">
          <span class="value-display"></span>
        </div>
        <div class="control-row">
          <label>Sustain</label>
          <input type="range" min="0" max="1" step="0.001" value="0.3"
                 data-param="filterSustain" data-mapping="linear">
          <span class="value-display"></span>
        </div>
        <div class="control-row">
          <label>Release</label>
          <input type="range" min="0" max="1" step="0.001" value="0.45"
                 data-param="filterRelease" data-mapping="time">
          <span class="value-display"></span>
        </div>
      </details>
    </div>

    <!-- Harmonics bar chart -->
    <details class="harmonics" open>
      <summary>Harmonics</summary>
      <canvas id="harmonics-chart" width="700" height="120"></canvas>
    </details>

    <!-- Master: full width -->
    <details class="master" open>
      <summary>Master</summary>
      <div class="control-row">
        <label>Volume</label>
        <input type="range" min="0" max="1" step="0.001" value="0.5"
               data-param="masterVolume" data-mapping="linear">
        <span class="value-display"></span>
      </div>
    </details>

    <div class="keyboard-help">
      Press any key to start &mdash;
      Lower: Z S X D C V G B H N J M &nbsp;|&nbsp;
      Upper: Q 2 W 3 E R 5 T 6 Y 7 U
    </div>
  </div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
